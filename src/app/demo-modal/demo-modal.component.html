<div class="modal-header-bar d-flex align-items-center justify-content-between px-4 pt-4 pb-3">
  <div>
    @if (data.badge) {
      <span class="badge rounded-pill bg-primary-subtle text-primary mb-1">{{ data.badge }}</span>
    }
    <h5 class="modal-title fw-bold mb-0 fs-5">{{ data.title }}</h5>
  </div>
  <button
    type="button"
    class="btn-close btn-close-sm"
    aria-label="Close"
    (click)="close()"
  ></button>
</div>

<div class="px-4 py-3">
  <p class="text-secondary mb-3" style="line-height: 1.6">{{ data.message }}</p>

  @if (data.fromParent) {
    <div class="from-parent-banner mb-4">
      <span class="from-parent-label">
        <i class="bi bi-arrow-down-left-square me-1"></i>
        Received from parent
      </span>
      <span class="from-parent-value">{{ data.fromParent }}</span>
    </div>
  }

  <div class="mb-4">
    <label
      for="demo-input"
      class="form-label fw-semibold text-dark small text-uppercase tracking-wide"
    >
      Your reply
    </label>
    <input
      id="demo-input"
      type="text"
      class="form-control form-control-lg"
      placeholder="Type something to send back to the parent…"
      [(ngModel)]="inputText"
      (keyup.enter)="close()"
    />
  </div>
</div>

<div
  class="d-flex justify-content-end gap-2 px-4 py-3 border-top bg-body-tertiary"
  style="border-radius: 0 0 14px 14px"
>
  <button type="button" class="btn btn-primary px-4" (click)="close()">
    <i class="bi bi-send me-2"></i>Close &amp; send
  </button>
</div>
